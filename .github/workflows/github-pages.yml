# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    tags:
      - "*"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    permissions:
      contents: read # Needed to checkout code
    runs-on: ubuntu-latest
    environment:
      name: github-pages-build

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 #v4.3
        with:
          persist-credentials: false

      - name: Make envfile
        uses: SpicyPizza/create-envfile@ace6d4f5d7802b600276c23ca417e669f1a06f6f #v2.0.3
        with:
          envkey_PUBLIC_SULLY_URL: ${{ vars.PUBLIC_SULLY_URL }}
          envkey_PUBLIC_TONKS_URL: ${{ vars.PUBLIC_TONKS_URL }}
          #should uncomment and test this one at some point
          #envkey_PUBLIC_SITE: ${{ vars.PUBLIC_SITE }}
          envkey_PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL }}
          directory: .
          file_name: .env

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e #v6.4
        with:
          package-manager-cache: false
          node-version: ${{ matrix.node-version }}

      - name: use pnpm ${{ matrix.node-version }}
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 #v4.3
        with:
          version: latest

      - name: Build
        run: |
          pnpm install --ignore-scripts
          pnpm approve-builds esbuild
          pnpm install
          pnpm build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa #v3.0.1
        with:
          # Upload entire repository
          path: "./dist"

  # Single deploy job since we're just deploying
  deploy:
    # Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
    permissions:
      contents: read
      pages: write
      id-token: write
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e #v4.0.5
